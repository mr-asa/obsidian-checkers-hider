name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

env:
  PLUGIN_ID: obsidian-checkers-hider

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package plugin
        run: |
          mkdir "${PLUGIN_ID}"
          cp dist/main.js manifest.json styles.css "${PLUGIN_ID}/"
          zip -r "${PLUGIN_ID}.zip" "${PLUGIN_ID}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.PLUGIN_ID }}.zip
            dist/main.js
            manifest.json
            styles.css
